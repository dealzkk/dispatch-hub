<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dispatch Hub</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>

  <style>
    /* Prevent the entire page from scrolling */
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden; 
      background-color: #f8f9fa;
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: #1c1e21;
    }

    .app-wrapper {
      height: 100vh;
      padding: 15px;
      display: flex;
    }

    .tool-column {
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .tool-card {
      background: #ffffff;
      padding: 24px;
      border-radius: 12px;
      border: 1px solid #dee2e6;
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
    }

    .tool-card::-webkit-scrollbar { width: 5px; }
    .tool-card::-webkit-scrollbar-track { background: transparent; }
    .tool-card::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 10px; }

    .section-title {
      font-weight: 700;
      color: #003087;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      background: white;
      padding-bottom: 10px;
    }

    .sticky-title {
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .form-label {
      font-weight: 600;
      color: #6c757d;
      font-size: 0.75rem;
      margin-bottom: 0.25rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .form-control, .form-select {
      border-radius: 8px;
      padding: 10px;
      border: 1px solid #ced4da;
      font-size: 0.9rem;
    }

    /* REMOVE TEXTAREA SCROLLBARS AND RESIZE HANDLE */
    textarea.form-control {
      resize: none;
      overflow: hidden;
      min-height: 45px;
    }

    .calc-summary-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      margin: 15px 0;
      text-align: center;
    }
    .summary-box {
      padding: 8px;
      border-radius: 8px;
      background: #f8f9fa;
      border: 1px solid #e9ecef;
    }
    .summary-box .data-label { font-size: 0.65rem; display: block; }
    .summary-box .data-value { font-size: 0.85rem; display: block; }
    .summary-highlight { background: #f0f7ff; border-color: #cfe2ff; }

    .btn-primary { background-color: #0070ba; border: none; font-weight: 600; }
    .btn-success { font-weight: 600; font-size: 0.85rem; }

    .result-group {
      background-color: #f8f9fa;
      border-radius: 8px;
      padding: 12px;
      border: 1px solid #e9ecef;
      margin-top: 10px;
    }

    .peso-display {
      background-color: #f0f7ff;
      border: 1px solid #cfe2ff;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      margin-top: 10px;
    }

    .peso-total { font-size: 2rem; font-weight: 800; color: #0070ba; }
    .hidden { display: none; }
    hr { border-color: #edf2f7; margin: 20px 0; }

    .fade-out { opacity: 1; transition: opacity 0.5s ease; }
    .fade-out.hidden { opacity: 0; }
  </style>
</head>
<body>

  <div class="app-wrapper">
    <div class="container-fluid h-100">
      <div class="row h-100 g-3">
        
        <div class="col-lg-4 tool-column">
          <div class="tool-card">
            <h4 class="section-title"><i class="fa-solid fa-font me-2"></i> Case Converter</h4>
            <label class="form-label">Input Text</label>
            <textarea class="form-control mb-3" id="inputText" rows="1" placeholder="Paste text..."></textarea>
            
            <div class="position-relative">
              <label class="form-label">Output (Proper Case)</label>
              <span id="copyAlert" class="text-success ms-2 fade-out hidden" style="font-size: 0.7rem; font-weight: bold;">Copied!</span>
              <textarea class="form-control" id="outputText" rows="1" readonly style="cursor: pointer; background-color: #f0f7ff; border-color: #cfe2ff;"></textarea>
            </div>

            <hr>

            <h4 class="section-title sticky-title"><i class="fa-solid fa-money-bill-1-wave me-2"></i> Express Estimate</h4>
            
            <label class="form-label">Item Price (JPY)</label>
            <div class="input-group mb-3">
              <span class="input-group-text bg-light border-end-0">¥</span>
              <input type="number" id="calc_price" class="form-control border-start-0" placeholder="0" oninput="runCalc()">
            </div>

            <label class="form-label">Shipping Fee</label>
            <select id="calc_ship_select" class="form-select mb-3" onchange="toggleCustomShip()">
              <option value="0">Select option...</option>
              <optgroup label="Mobile/Tablet">
                <option value="1900">1-2 Phone No Box (¥1,900)</option>
                <option value="2800">1-2 Phone w/ Box (¥2,800)</option>
                <option value="4800">1-2 Tablet (¥4,800)</option>
              </optgroup>
              <optgroup label="Laptop">
                <option value="4800">Standard Laptop (¥4,800)</option>
                <option value="7800">Gaming/2 Standard Laptop (¥7,800)</option>
              </optgroup>
              <option value="custom">Custom Amount...</option>
            </select>

            <div id="calc_custom_div" class="mb-3 hidden">
              <label class="form-label text-muted">Custom JPY Amount</label>
              <input type="number" id="calc_custom_val" class="form-control" oninput="runCalc()">
            </div>

            <div class="calc-summary-grid">
              <div class="summary-box">
                <span class="data-label">Subtotal</span>
                <span class="data-value" id="res_subtotal">¥0</span>
              </div>
              <div class="summary-box">
                <span class="data-label">Fee (5%)</span>
                <span class="data-value" id="res_fee">¥0</span>
              </div>
              <div class="summary-box summary-highlight">
                <span class="data-label" style="font-weight:700; color:#0070ba;">TOTAL JPY</span>
                <span class="data-value" id="res_yen" style="font-weight:800; color:#0070ba;">¥0</span>
              </div>
            </div>

            <div class="peso-display">
              <div class="form-label" style="color: #0070ba;">Estimated Grand Total</div>
              <div class="peso-total" id="res_php">₱0.00</div>
              <div class="text-muted small mt-1">Converted at 0.4 Rate</div>
            </div>
          </div>
        </div>

        <div class="col-lg-4 tool-column">
          <div class="tool-card">
            <h4 class="section-title sticky-title"><i class="fa-solid fa-map-location-dot me-2"></i> PHL Address Search</h4>
            <label class="form-label">Quick Search</label>
            <div class="input-group mb-3">
              <input type="text" id="ph_zip" class="form-control" placeholder="Zip Code" onkeyup="if(event.key==='Enter') ph_zipSearch()">
              <button class="btn btn-primary px-3" onclick="ph_zipSearch()"><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>
            <label class="form-label">Filter by Location</label>
            <select id="ph_pref" class="form-select mb-2" onchange="ph_onPrefChange()"><option value="">Province</option></select>
            <select id="ph_city" class="form-select mb-2" onchange="ph_onCityChange()"><option value="">City/Municipality</option></select>
            <select id="ph_town" class="form-select mb-3"><option value="">Barangay</option></select>
            <button class="btn btn-primary w-100 mb-2" onclick="ph_locSearch()">Search Location</button>
            <hr>
            <div id="ph_results"></div>
          </div>
        </div>

        <div class="col-lg-4 tool-column">
          <div class="tool-card">
            <h4 class="section-title sticky-title"><i class="fa-solid fa-house-chimney-window me-2"></i> JPN Address Search</h4>
            <label class="form-label">Quick Search</label>
            <div class="input-group mb-3">
              <input type="text" id="jp_zip" class="form-control" placeholder="Postal Code" onkeyup="if(event.key==='Enter') jp_zipSearch()">
              <button class="btn btn-primary px-3" onclick="jp_zipSearch()"><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>
            <label class="form-label">Filter by Location</label>
            <select id="jp_pref" class="form-select mb-2" onchange="jp_onPrefChange()"><option value="">Prefecture</option></select>
            <select id="jp_city" class="form-select mb-2" onchange="jp_onCityChange()"><option value="">City</option></select>
            <select id="jp_town" class="form-select mb-3"><option value="">Town</option></select>
            <button class="btn btn-primary w-100 mb-2" onclick="jp_locSearch()">Search Location</button>
            <hr>
            <div id="jp_results"></div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <script>
    const CSV_PH = 'https://docs.google.com/spreadsheets/d/1-R5CPOEqhmPJZMde0dxa7rwMxyEgsh-CWM3j824rAhY/export?format=csv&gid=913175296';
    const CSV_JP = 'https://docs.google.com/spreadsheets/d/1YFoo7jsfjjdkJybpM52329vJ5pmOOct44mnZ90z3SJk/export?format=csv&gid=449666268';

    let dataPH = [], dataJP = [];
    let treePH = {}, treeJP = {};

    window.onload = () => {
      Papa.parse(CSV_PH, { download: true, header: true, complete: (r) => { 
        dataPH = r.data; 
        dataPH.forEach(row => {
          if(!row.prefecture) return;
          if(!treePH[row.prefecture]) treePH[row.prefecture] = {};
          if(!treePH[row.prefecture][row.city]) treePH[row.prefecture][row.city] = [];
          if(row.town && !treePH[row.prefecture][row.city].includes(row.town)) treePH[row.prefecture][row.city].push(row.town);
        });
        const s = document.getElementById('ph_pref');
        Object.keys(treePH).sort().forEach(p => s.add(new Option(p, p)));
      }});
      Papa.parse(CSV_JP, { download: true, header: true, complete: (r) => { 
        dataJP = r.data;
        dataJP.forEach(row => {
          if(!row.prefecture) return;
          if(!treeJP[row.prefecture]) treeJP[row.prefecture] = {};
          if(!treeJP[row.prefecture][row.city]) treeJP[row.prefecture][row.city] = [];
          if(row.town && !treeJP[row.prefecture][row.city].includes(row.town)) treeJP[row.prefecture][row.city].push(row.town);
        });
        const s = document.getElementById('jp_pref');
        Object.keys(treeJP).sort().forEach(p => s.add(new Option(p, p)));
      }});
    };

    function toggleCustomShip() {
      const v = document.getElementById('calc_ship_select').value;
      document.getElementById('calc_custom_div').className = (v === 'custom' ? 'mb-3' : 'hidden');
      runCalc();
    }
    function runCalc() {
      let p = parseFloat(document.getElementById('calc_price').value) || 0;
      let sV = document.getElementById('calc_ship_select').value;
      let s = sV === 'custom' ? (parseFloat(document.getElementById('calc_custom_val').value) || 0) : parseFloat(sV);
      let subtotal = p + s;
      let f = subtotal * 0.05;
      let ty = subtotal + f;
      document.getElementById('res_fee').innerText = '¥' + Math.round(f).toLocaleString();
      document.getElementById('res_subtotal').innerText = '¥' + subtotal.toLocaleString();
      document.getElementById('res_yen').innerText = '¥' + Math.round(ty).toLocaleString();
      document.getElementById('res_php').innerText = '₱' + (ty * 0.4).toLocaleString(undefined, {minimumFractionDigits:2});
    }

    /* Case Converter Logic */
    function toProperCase(text) {
      return text.replace(/\w\S*/g, (word) =>
        word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()
      );
    }
    document.getElementById('inputText').addEventListener('input', function () {
      document.getElementById('outputText').value = toProperCase(this.value);
    });
    document.getElementById('outputText').addEventListener('click', function () {
      if(!this.value) return;
      const el = document.createElement('textarea');
      el.value = this.value; document.body.appendChild(el);
      el.select(); document.execCommand('copy'); document.body.removeChild(el);
      const alert = document.getElementById('copyAlert');
      alert.classList.remove('hidden');
      setTimeout(() => alert.classList.add('hidden'), 2000);
    });

    /* PH Address Logic */
    function ph_onPrefChange() {
      const p = document.getElementById('ph_pref').value;
      const s = document.getElementById('ph_city');
      s.innerHTML = '<option value="">City/Municipality</option>';
      if(p) Object.keys(treePH[p]).sort().forEach(c => s.add(new Option(c, c)));
    }
    function ph_onCityChange() {
      const p = document.getElementById('ph_pref').value;
      const c = document.getElementById('ph_city').value;
      const s = document.getElementById('ph_town');
      s.innerHTML = '<option value="">Barangay</option>';
      if(p && c) treePH[p][c].sort().forEach(t => s.add(new Option(t, t)));
    }
    function ph_zipSearch() { ph_render(dataPH.filter(r => r.postal_code == document.getElementById('ph_zip').value)); }
    function ph_locSearch() {
      const p = document.getElementById('ph_pref').value, c = document.getElementById('ph_city').value, t = document.getElementById('ph_town').value;
      ph_render(dataPH.filter(r => r.prefecture === p && r.city === c && r.town === t));
    }
    function ph_render(rows) {
      const cont = document.getElementById('ph_results'); cont.innerHTML = '';
      rows.forEach(r => {
        const d = document.createElement('div'); d.className = 'result-group';
        d.innerHTML = `<table class="table table-sm table-borderless mb-2"><tr><td><strong>Address</strong></td><td>${r.address} ${r.postal}</td></tr></table>
        <button class="btn btn-success btn-sm w-100" onclick="copyIt('${r.address} ${r.postal}', this)">Copy Address</button>`;
        cont.appendChild(d);
      });
    }

    /* JP Address Logic */
    function jp_onPrefChange() {
      const p = document.getElementById('jp_pref').value;
      const s = document.getElementById('jp_city');
      s.innerHTML = '<option value="">City</option>';
      if(p) Object.keys(treeJP[p]).sort().forEach(c => s.add(new Option(c, c)));
    }
    function jp_onCityChange() {
      const p = document.getElementById('jp_pref').value;
      const c = document.getElementById('jp_city').value;
      const s = document.getElementById('jp_town');
      s.innerHTML = '<option value="">Town</option>';
      if(p && c) treeJP[p][c].sort().forEach(t => s.add(new Option(t, t)));
    }
    function jp_zipSearch() { jp_render(dataJP.filter(r => r.postal_code == document.getElementById('jp_zip').value.replace(/-/g,''))); }
    function jp_locSearch() {
      const p = document.getElementById('jp_pref').value, c = document.getElementById('jp_city').value, t = document.getElementById('jp_town').value;
      jp_render(dataJP.filter(r => r.prefecture === p && r.city === c && r.town === t));
    }
    function jp_render(rows) {
      const cont = document.getElementById('jp_results'); cont.innerHTML = '';
      rows.forEach(r => {
        const d = document.createElement('div'); d.className = 'result-group';
        d.innerHTML = `<table class="table table-sm table-borderless mb-2">
          <tr><td><strong>〒</strong></td><td>${r.postal}</td></tr><tr><td><strong>EN</strong></td><td>${r.english_address}</td></tr><tr><td><strong>JP</strong></td><td>${r.japanese_address}</td></tr><tr><td><strong>SF</strong></td><td>¥${r.shipping_fee}</td></tr><tr><td><strong>ETA</strong></td><td>${r.lead_time}</td></tr>
        </table><button class="btn btn-success btn-sm w-100" onclick="copyIt('${r.postal}\\n${r.english_address}\\n${r.japanese_address}', this)">Copy All Details</button>`;
        cont.appendChild(d);
      });
    }

    function copyIt(txt, btn) {
      const el = document.createElement('textarea'); el.value = txt; document.body.appendChild(el);
      el.select(); document.execCommand('copy'); document.body.removeChild(el);
      const old = btn.innerHTML; btn.innerHTML = '<i class="fa-solid fa-check"></i> Copied'; btn.classList.replace('btn-success', 'btn-dark');
      setTimeout(() => { btn.innerHTML = old; btn.classList.replace('btn-dark', 'btn-success'); }, 1200);
    }
  </script>
</body>
</html>
